<!DOCTYPE html>
<html lang="bn">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>সাহিত্য কানন | গল্প ও কবিতা আপলোড</title>
    <style>
        :root {
            --primary: #1a1a2e;
            --secondary: #16213e;
            --accent: #e94560;
            --text: #ffffff;
            --light-bg: #f4f4f9;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            background-color: var(--light-bg);
            color: #333;
        }

        header {
            background: linear-gradient(rgba(26, 26, 46, 0.9), rgba(22, 33, 62, 0.9)), url('https://images.unsplash.com/photo-1455390582262-044cdead277a?auto=format&fit=crop&q=80&w=1000');
            background-size: cover;
            background-position: center;
            color: white;
            padding: 60px 20px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .container {
            max-width: 1000px;
            margin: auto;
            padding: 20px;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: -30px;
            margin-bottom: 30px;
        }

        button {
            padding: 12px 25px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s transform;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        button:active {
            transform: scale(0.95);
        }

        .btn-add {
            background-color: var(--accent);
            color: white;
        }

        .btn-config {
            background-color: var(--primary);
            color: white;
        }

        .btn-reset {
            background-color: #555;
            color: white;
            font-size: 11px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        input,
        textarea,
        select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            border-left: 5px solid var(--accent);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card h3 {
            margin: 0 0 10px 0;
            color: var(--primary);
        }

        .content-display {
            white-space: pre-wrap;
            /* লাইন ব্রেক বজায় রাখে */
            font-size: 15px;
            line-height: 1.7;
            color: #444;
            margin-top: 15px;
            padding-top: 10px;
            border-top: 1px dashed #ccc;
        }

        .section-title {
            margin: 40px 0 20px 0;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--primary);
            color: var(--primary);
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>

    <header>
        <h1>সাহিত্য কানন</h1>
        <p>আপনার প্রিয় গল্প ও কবিতা আপলোড করুন</p>
    </header>

    <div class="container">
        <div class="controls">
            <button id="mainAddBtn" class="btn-add" onclick="toggleModal('postModal', true)">+ নতুন লেখা যোগ
                করুন</button>
            <button class="btn-config" onclick="toggleModal('configModal', true)">সেটিংস</button>
            <button class="btn-reset" onclick="resetApp()">রিসেট</button>
        </div>

        <div id="loading" style="text-align: center; display: none;">লোড হচ্ছে...</div>

        <h2 class="section-title">কবিতা সংকলন</h2>
        <div id="poemGrid" class="grid"></div>

        <h2 class="section-title">গল্পগুচ্ছ</h2>
        <div id="storyGrid" class="grid"></div>
    </div>

    <div id="configModal" class="modal">
        <div class="modal-content">
            <h2>API সেটিংস</h2>
            <p style="font-size: 13px; color: #666;">আপনার Master Key এবং Bin ID দিয়ে কানেক্ট করুন।</p>
            <input type="password" id="mKey" placeholder="Master Key (JSONBin)">
            <input type="text" id="bId" placeholder="Bin ID">
            <button class="btn-add" style="width:100%" onclick="saveSettings()">সেভ করুন</button>
            <button onclick="toggleModal('configModal', false)"
                style="background:none; border:none; color:red; margin-top:10px; cursor:pointer;">বন্ধ করুন</button>
        </div>
    </div>

    <div id="postModal" class="modal">
        <div class="modal-content" style="max-width: 700px;">
            <h2>নতুন সৃষ্টি যোগ করুন</h2>
            <label for="type">ধরণ নির্বাচন করুন:</label>
            <select id="type">
                <option value="poem">কবিতা</option>
                <option value="story">গল্প</option>
            </select>
            <input type="text" id="title" placeholder="কবিতা বা গল্পের নাম">
            <input type="text" id="author" placeholder="লেখকের নাম">
            <textarea id="content" rows="10"
                placeholder="আপনার লেখাটি এখানে লিখুন বা পেস্ট করুন (Enter দিলে নিউ লাইন তৈরি হবে)..."></textarea>
            <button class="btn-add" style="width:100%" onclick="uploadPost()">প্রকাশ করুন</button>
            <button onclick="toggleModal('postModal', false)"
                style="background:none; border:none; color:#777; margin-top:10px; cursor:pointer;">বাতিল</button>
        </div>
    </div>

    <script>
        let db = { stories: [], poems: [] };

        // পেজ লোড হলে ডেটা ফেচ করা
        window.onload = function () {
            fetchData();
        };

        function toggleModal(id, show) {
            document.getElementById(id).style.display = show ? 'flex' : 'none';
        }

        function saveSettings() {
            const mk = document.getElementById('mKey').value.trim();
            const bi = document.getElementById('bId').value.trim();
            if (!mk || !bi) return alert("সব তথ্য দিন!");
            localStorage.setItem('mk_kanon', mk);
            localStorage.setItem('bid_kanon', bi);
            location.reload();
        }

        function resetApp() {
            if (confirm("সব সেটিংস মুছে ফেলতে চান?")) {
                localStorage.clear();
                location.reload();
            }
        }

        async function fetchData() {
            document.getElementById('loading').style.display = 'block';
            try {
                // আপনার সার্ভারলেস ফাংশন বা প্রক্সি এপিআই কল
                const res = await fetch('/api/publish');
                if (!res.ok) throw new Error();
                db = await res.json();
                renderUI();
            } catch (e) {
                console.error("ডেটা লোড করতে সমস্যা:", e);
                // যদি এপিআই না থাকে তবে লোকাল মেসেজ
                document.getElementById('poemGrid').innerHTML = "<p>ডেটা লোড করা যাচ্ছে না। API কনফিগারেশন চেক করুন।</p>";
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }

        async function uploadPost() {
            const type = document.getElementById('type').value;
            const title = document.getElementById('title').value;
            const author = document.getElementById('author').value;
            const content = document.getElementById('content').value;

            if (!title || !content) return alert("শিরোনাম এবং মূল লেখা আবশ্যক!");

            const postData = {
                type,
                title,
                author: author || 'অজানা',
                content,
                date: new Date().toLocaleDateString('bn-BD')
            };

            try {
                const res = await fetch('/api/publish', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(postData)
                });

                if (res.ok) {
                    alert("সফলভাবে প্রকাশিত হয়েছে!");
                    toggleModal('postModal', false);
                    document.getElementById('title').value = '';
                    document.getElementById('author').value = '';
                    document.getElementById('content').value = '';
                    fetchData(); // রিফ্রেশ ডেটা
                } else {
                    alert("প্রকাশ করতে সমস্যা হয়েছে।");
                }
            } catch (e) {
                alert("সার্ভার কানেকশন পাওয়া যায়নি।");
            }
        }

        function renderUI() {
            const sGrid = document.getElementById('storyGrid');
            const pGrid = document.getElementById('poemGrid');
            sGrid.innerHTML = ''; pGrid.innerHTML = '';

            // কবিতা রেন্ডারিং
            if (db.poems && db.poems.length > 0) {
                db.poems.forEach(item => {
                    pGrid.innerHTML += `
                        <div class="card" style="border-left-color: #9b59b6;">
                            <h3>${item.title}</h3>
                            <small>কবি: ${item.author || 'অজানা'}</small>
                            <div class="content-display">${item.content}</div>
                        </div>`;
                });
            } else {
                pGrid.innerHTML = "<p>কোনো কবিতা পাওয়া যায়নি।</p>";
            }

            // গল্প রেন্ডারিং
            if (db.stories && db.stories.length > 0) {
                db.stories.forEach(item => {
                    sGrid.innerHTML += `
                        <div class="card">
                            <h3>${item.title}</h3>
                            <small>লেখক: ${item.author || 'অজানা'}</small>
                            <div class="content-display">${item.content}</div>
                        </div>`;
                });
            } else {
                sGrid.innerHTML = "<p>কোনো গল্প পাওয়া যায়নি।</p>";
            }
        }
    </script>
</body>

</html>
